<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lnpGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="mrnaGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cellGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.1" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#fafbfc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50">
    mRNA-LNPз–«иӢ—дёӯзҡ„иӣӢзҷҪиҙЁеҶ пјҡApoEд»ӢеҜјзҡ„иӮқи„Ҹйқ¶еҗ‘
  </text>
  
  <!-- Left: Blood circulation -->
  <g transform="translate(50, 80)">
    <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">иЎҖж¶ІеҫӘзҺҜ</text>
    
    <!-- Blood vessel background -->
    <rect x="0" y="20" width="300" height="280" rx="10" fill="#ffebee" stroke="#ef5350" stroke-width="2"/>
    
    <!-- LNP with corona -->
    <g transform="translate(80, 100)">
      <!-- LNP core -->
      <circle cx="0" cy="0" r="40" fill="url(#lnpGradient)"/>
      <!-- mRNA inside -->
      <path d="M-20,-10 Q0,-25 20,-10 Q0,5 -20,-10" fill="none" stroke="url(#mrnaGradient)" stroke-width="4"/>
      <path d="M-15,5 Q5,20 25,5" fill="none" stroke="url(#mrnaGradient)" stroke-width="4"/>
      
      <!-- ApoE proteins on corona -->
      <ellipse cx="-50" cy="-15" rx="12" ry="10" fill="#e67e22"/>
      <ellipse cx="50" cy="-15" rx="12" ry="10" fill="#e67e22"/>
      <ellipse cx="-48" cy="25" rx="12" ry="10" fill="#e67e22"/>
      <ellipse cx="48" cy="25" rx="12" ry="10" fill="#e67e22"/>
      <ellipse cx="0" cy="-52" rx="12" ry="10" fill="#e67e22"/>
      <ellipse cx="0" cy="52" rx="12" ry="10" fill="#e67e22"/>
      
      <text x="0" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#e67e22" font-weight="bold">ApoEеҶ </text>
    </g>
    
    <!-- Floating ApoE in blood -->
    <ellipse cx="200" cy="80" rx="10" ry="8" fill="#f39c12" opacity="0.6"/>
    <ellipse cx="230" cy="150" rx="10" ry="8" fill="#f39c12" opacity="0.6"/>
    <ellipse cx="190" cy="200" rx="10" ry="8" fill="#f39c12" opacity="0.6"/>
    
    <text x="150" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d">
      иЎҖжөҶдёӯApoEеҗёйҷ„еҲ°LNPиЎЁйқў
    </text>
  </g>
  
  <!-- Arrow -->
  <g transform="translate(370, 220)">
    <path d="M0,0 L50,0 L40,-10 M50,0 L40,10" stroke="#27ae60" stroke-width="4" fill="none"/>
    <text x="25" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#27ae60">иҜҶеҲ« &amp; з»“еҗҲ</text>
  </g>
  
  <!-- Right: Liver cell uptake -->
  <g transform="translate(450, 80)">
    <text x="150" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#34495e">иӮқз»Ҷиғһж‘„еҸ–</text>
    
    <!-- Liver cell -->
    <rect x="0" y="20" width="300" height="280" rx="10" fill="#e8f5e9" stroke="#66bb6a" stroke-width="2"/>
    
    <!-- Cell membrane -->
    <path d="M0,60 Q150,55 300,60" stroke="#4caf50" stroke-width="3" fill="none"/>
    
    <!-- LDL receptor -->
    <g transform="translate(150, 55)">
      <path d="M-15,0 L-10,25 L10,25 L15,0 Z" fill="#8e44ad"/>
      <text x="0" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8e44ad">LDLеҸ—дҪ“</text>
    </g>
    
    <!-- LNP binding to receptor -->
    <g transform="translate(150, 10)">
      <!-- LNP -->
      <circle cx="0" cy="0" r="35" fill="url(#lnpGradient)"/>
      <!-- ApoE bridging -->
      <ellipse cx="0" cy="38" rx="12" ry="10" fill="#e67e22"/>
      <!-- Connection line -->
      <line x1="0" y1="35" x2="0" y2="50" stroke="#e67e22" stroke-width="3"/>
      
      <text x="0" y="-50" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#2c3e50" font-weight="bold">ApoEжЎҘжҺҘ</text>
    </g>
    
    <!-- Internalized LNP -->
    <g transform="translate(100, 180)">
      <circle cx="0" cy="0" r="30" fill="url(#lnpGradient)" opacity="0.8"/>
      <ellipse cx="-38" cy="0" rx="10" ry="8" fill="#e67e22" opacity="0.8"/>
      <text x="0" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#27ae60">еҶ…еҗһиҝӣе…Ҙз»Ҷиғһ</text>
    </g>
    
    <!-- Endosome escape -->
    <g transform="translate(200, 180)">
      <path d="M-25,0 Q0,-15 25,0 Q0,15 -25,0" fill="none" stroke="#9b59b6" stroke-width="2" stroke-dasharray="3,3"/>
      <circle cx="0" cy="0" r="20" fill="url(#lnpGradient)"/>
      <text x="0" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#9b59b6">еҶ…дҪ“йҖғйҖё</text>
    </g>
    
    <!-- mRNA release -->
    <g transform="translate(150, 260)">
      <path d="M-15,0 Q0,-10 15,0" fill="none" stroke="#e74c3c" stroke-width="3"/>
      <text x="0" y="20" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#e74c3c">mRNAйҮҠж”ҫ вҶ’ зҝ»иҜ‘</text>
    </g>
  </g>
  
  <!-- Bottom info box -->
  <g transform="translate(50, 380)">
    <rect x="0" y="0" width="700" height="55" rx="8" fill="#fff3e0" stroke="#ff9800" stroke-width="1"/>
    <text x="350" y="22" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#e65100">
      рҹ’Ў е·ҘзЁӢеҗҜзӨә
    </text>
    <text x="350" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5d4037">
      и°ғиҠӮPEGи„ӮиҙЁжҜ”дҫӢеҸҜжҺ§еҲ¶ApoEеҗёйҷ„йҮҸ В· еј•е…ҘGalNAcеҸҜз«һдәүApoEз»“еҗҲдҪҚзӮ№е®һзҺ°иӮқйқ¶еҗ‘дјҳеҢ–
    </text>
  </g>
</svg>